name: DPC CSV 生成

on:
  workflow_dispatch:
    inputs:
      dpc6:
        description: 'DPC6桁コード（6桁数字）'
        required: true
        default: '040040'
      all_0_ope_1:
        description: '患者数区分（0=全件 / 1=手術あり）'
        required: true
        type: choice
        options:
          - '0'
          - '1'
        default: '1'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Install system dependencies（tidyverseに必須）
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libxml2-dev libssl-dev libcurl4-openssl-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev

      - name: Install pak（高速パッケージ管理ツール）
        run: Rscript -e 'install.packages("pak", repos = "https://cran.rstudio.com", quiet = TRUE)'

      - name: Install R packages with pak（これで確実にインストール）
        run: Rscript -e '
          pak::pak(c("tidyverse", "arrow", "conflicted"))
          '

      - name: Verify packages（インストール確認）
        run: Rscript -e '
          library(tidyverse)
          library(arrow)
          library(conflicted)
          conflicts_prefer(dplyr::filter)
          cat("✅ All packages loaded successfully!\n")
          '

      - name: Run R script
        run: Rscript scripts/generate_dpc_csv.R "${{ inputs.dpc6 }}" "${{ inputs.all_0_ope_1 }}"

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dpc-csv-${{ inputs.dpc6 }}
          path: "*.csv"
          retention-days: 14
