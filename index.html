<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPC6桁コード別 病院別患者数集計ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', system-ui, sans-serif; }
        .form-container {
            max-width: 620px;
            margin: 40px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 py-12">
    <div class="max-w-4xl mx-auto px-6">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">DPC6桁コード別 病院別患者数集計ツール</h1>
            <p class="text-xl text-gray-600">GitHub Actions で即時CSV生成</p>
        </div>

        <div class="form-container p-10">
            <form id="dpcForm" class="space-y-8">
                <!-- DPC6桁コード -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">DPC6桁コード <span class="text-red-500">*</span></label>
                    <input type="text" id="dpc6" maxlength="6" pattern="[0-9]{6}" placeholder="例: 040040" required
                           class="w-full px-5 py-4 text-2xl font-medium border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100">
                </div>

                <!-- 患者数区分 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">集計対象の患者数</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="flex items-center justify-center p-6 border-2 rounded-3xl cursor-pointer transition-all hover:border-blue-300 has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50" id="label0">
                            <input type="radio" name="all_0_ope_1" value="0" checked class="sr-only">
                            <div class="text-center">
                                <div class="text-5xl mb-3">📊</div>
                                <div class="font-semibold">全件（すべて）</div>
                                <div class="text-xs text-gray-500">all_0_ope_1 = 0</div>
                            </div>
                        </label>
                        <label class="flex items-center justify-center p-6 border-2 rounded-3xl cursor-pointer transition-all hover:border-blue-300 has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50" id="label1">
                            <input type="radio" name="all_0_ope_1" value="1" class="sr-only">
                            <div class="text-center">
                                <div class="text-5xl mb-3">🩸</div>
                                <div class="font-semibold">手術ありの実件数</div>
                                <div class="text-xs text-gray-500">all_0_ope_1 = 1</div>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" id="submitBtn"
                        class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold text-xl py-6 rounded-3xl shadow-lg flex items-center justify-center gap-3">
                    GitHub Actions で CSV を生成する →
                </button>
            </form>

            <div id="result" class="hidden mt-8 p-6 bg-gray-50 rounded-3xl text-sm"></div>
        </div>
    </div>

    <script>
        tailwind.config = { content: [] };

        document.getElementById('dpcForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const dpc6 = document.getElementById('dpc6').value.trim();
            const all0ope1 = document.querySelector('input[name="all_0_ope_1"]:checked').value;
            
            if (!/^[0-9]{6}$/.test(dpc6)) {
                alert('DPCコードは6桁の数字で入力してください');
                return;
            }

            // === 自動で正しいActionsリンクを生成 ===
            const hostname = window.location.hostname;
            const username = hostname.replace('.github.io', '');
            const pathParts = window.location.pathname.split('/').filter(Boolean);
            const repo = pathParts[0] || 'dpc-csv-generator';   // リポジトリ名が違う場合はここで調整

            const actionsUrl = `https://github.com/${username}/${repo}/actions/workflows/generate-dpc-csv.yml`;

            const resultHTML = `
                <div class="text-emerald-700 font-medium mb-3">✅ 入力を受け付けました！</div>
                <div class="bg-white rounded-2xl p-5 font-mono text-sm space-y-2">
                    <div>dpc6 = <span class="font-bold">${dpc6}</span></div>
                    <div>all_0_ope_1 = <span class="font-bold">${all0ope1}</span></div>
                    <div class="text-xs text-gray-500">生成ファイル名例：${dpc6}_${all0ope1 === '0' ? 'all' : 'ope'}_2016_2024.csv</div>
                </div>
                <a href="${actionsUrl}" target="_blank"
                   class="mt-6 block w-full text-center bg-black text-white py-4 rounded-3xl font-bold hover:bg-gray-800 transition-colors">
                    → Actions ページを開いて「Run workflow」を実行
                </a>
                <p class="text-center text-xs text-gray-500 mt-4">※ 初めての場合は少し時間がかかります（2〜3分）</p>
            `;

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = resultHTML;
            resultDiv.classList.remove('hidden');
        });

        window.onload = () => {
            document.getElementById('label0').classList.add('ring-2', 'ring-blue-500');
        };
    </script>
</body>
</html>
